name: tezdrop
description: TezDrop - Lightning Fast Food & Grocery Delivery ⚡
version: 1.0.0+2
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP — Firebase REST API ke liye (no google-services.json needed)
  http: ^1.1.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^9.0.2
  webview_flutter: ^4.7.0

  # Storage
  shared_preferences: ^2.2.2

  # UI
  shimmer: ^3.0.0
  pinput: ^4.0.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0

  # Voice search
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1

  # PDF invoice generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Utils
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  package_info_plus: ^8.0.2
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dependency_overrides:
  shared_preferences_android: ">=2.0.0 <2.4.12"
  permission_handler_android: ^12.0.3
  geolocator_android: 4.4.0
  webview_flutter_android: ^3.15.0
  url_launcher_android: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

