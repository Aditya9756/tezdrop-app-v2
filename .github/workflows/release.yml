name: Flutter Release APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bump version code
        run: |
          BUILD_NUM=${{ github.run_number }}
          sed -i "s/version: .*/version: 1.0.${BUILD_NUM}+${BUILD_NUM}/" pubspec.yaml
          echo "Version set to 1.0.${BUILD_NUM}+${BUILD_NUM}"

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build Release APK
        env:
          FB_URL: ${{ secrets.FB_URL }}
          OTP_KEY: ${{ secrets.OTP_KEY }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flutter build apk --release \
            --dart-define=FB_URL=$FB_URL \
            --dart-define=OTP_KEY=$OTP_KEY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "TezDrop v${{ github.run_number }}"
          files: dist/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
